<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Warps</title>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <nav id="nav">
      <a href="/playground/" class="back">Playground</a>
      <span class="title">Warps</span>
    </nav>
    <button id="record-btn" aria-label="Record H.264 video (R)" data-tip="Record H.264 video — press R"></button>
    <button id="frame-btn" aria-label="Record PNG frame sequence for ProRes (P)" data-tip="Record PNG frame sequence for ProRes — press P"></button>
    <div id="frame-counter" class="hidden"></div>
    <div id="controls">
      <button data-effect="drape" class="active"><span class="key">1</span> Drape</button>
      <button data-effect="mercury"><span class="key">2</span> Mercury</button>
      <button data-effect="vcr"><span class="key">3</span> VCR</button>
      <button data-effect="refract"><span class="key">4</span> Refract</button>
      <button data-effect="ripple"><span class="key">5</span> Ripple</button>
      <button data-effect="warp"><span class="key">6</span> Warp</button>
    </div>
    <div id="image-controls">
      <div id="drop-zone" style="width:200px; padding:24px; border:2px dashed rgba(255,255,255,0.5); border-radius:12px; background:rgba(0,0,0,0.7); color:white; text-align:center; cursor:pointer; font-family:system-ui,sans-serif;">
        <p>Drop image/video here<br><span style="font-size:11px; opacity:0.6;">or click to browse</span></p>
        <input type="file" id="file-input" accept="image/*,video/*" style="display:none;" />
      </div>
      <div class="url-row" style="display:flex; gap:8px; margin-top:12px;">
        <input type="text" id="url-input" placeholder="Or paste image/video URL..." style="flex:1; padding:8px; border:1px solid rgba(255,255,255,0.3); border-radius:8px; background:rgba(0,0,0,0.7); color:white; font-size:12px;" />
        <button id="load-url" style="padding:8px 16px; border:1px solid rgba(255,255,255,0.3); border-radius:8px; background:rgba(0,0,0,0.7); color:white; cursor:pointer;">Load</button>
      </div>
      <div id="loading" class="hidden">Loading...</div>
    </div>
    <div id="bg-controls" style="position:fixed; bottom:100px; left:20px; z-index:1000; display:none;">
      <div style="color:rgba(255,255,255,0.5); font-family:system-ui,sans-serif; font-size:11px; text-transform:uppercase; letter-spacing:0.1em; margin-bottom:8px;">Background Video</div>
      <div id="bg-drop-zone" style="width:200px; padding:24px; border:2px dashed rgba(255,255,255,0.5); border-radius:12px; background:rgba(0,0,0,0.7); color:white; text-align:center; cursor:pointer; font-family:system-ui,sans-serif;">
        <p>Drop image/video here<br><span style="font-size:11px; opacity:0.6;">or click to browse</span></p>
        <input type="file" id="bg-file-input" accept="image/*,video/*" style="display:none;" />
      </div>
      <div class="url-row" style="display:flex; gap:8px; margin-top:12px;">
        <input type="text" id="bg-url-input" placeholder="Or paste image/video URL..." style="flex:1; padding:8px; border:1px solid rgba(255,255,255,0.3); border-radius:8px; background:rgba(0,0,0,0.7); color:white; font-size:12px;" />
        <button id="bg-load-url" style="padding:8px 16px; border:1px solid rgba(255,255,255,0.3); border-radius:8px; background:rgba(0,0,0,0.7); color:white; cursor:pointer;">Load</button>
      </div>
      <div id="bg-loading" class="hidden">Loading...</div>
    </div>
    <div id="sliders">
      <label>
        <span>Deform</span>
        <input type="range" id="deform" min="0" max="2" step="0.05" value="0.5">
      </label>
      <label>
        <span>Geometry</span>
        <input type="range" id="geometry" min="0.2" max="2" step="0.1" value="1">
      </label>
      <label>
        <span>Speed</span>
        <input type="range" id="speed" min="0" max="2" step="0.1" value="0.5">
      </label>
      <label>
        <span>Intensity</span>
        <input type="range" id="intensity" min="0.1" max="3" step="0.1" value="0.7">
      </label>
      <label>
        <span>Scale</span>
        <input type="range" id="scale" min="0.2" max="3" step="0.1" value="1">
      </label>
    </div>
    <script type="module" src="/src/warps.js"></script>
  </body>
</html>
