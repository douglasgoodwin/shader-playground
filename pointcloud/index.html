<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Point Cloud</title>
    <meta name="description" content="Depth-displaced point cloud from any image, video, or webcam. Each pixel becomes a point in space, pushed forward or back by its luminance." />
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <nav id="nav">
      <a href="/playground/" class="back">Playground</a>
      <span class="title">Point Cloud</span>
    </nav>
    <button id="record-btn" title="Record video (R)"></button>

    <div id="image-controls">
      <div id="drop-zone">
        <p>Drop image/video<br><span class="small">or click to browse</span></p>
        <input type="file" id="file-input" accept="image/*,video/*" />
      </div>
      <div class="row">
        <input type="text" id="url-input" placeholder="Paste URL…" />
        <button id="load-url">Load</button>
      </div>
      <button id="webcam-btn">Use Webcam</button>
      <button id="audio-btn">Use Mic</button>
      <button id="audio-file-btn">Load Audio</button>
      <input type="file" id="audio-file-input" accept="audio/*" style="display:none" />
      <div id="audio-meter"><div id="audio-meter-fill"></div></div>
      <div id="loading" class="hidden">Loading…</div>
    </div>

    <div id="sliders">
      <label>
        <span>Depth</span>
        <input type="range" id="depth" min="0" max="2.5" step="0.01" value="1.0">
      </label>
      <label>
        <span>Point size</span>
        <input type="range" id="pointSize" min="0.5" max="8" step="0.1" value="2.0">
      </label>
      <label>
        <span>Smoothing</span>
        <input type="range" id="blurRadius" min="0" max="12" step="0.1" value="3.0">
      </label>
      <label>
        <span>Color boost</span>
        <input type="range" id="colorBoost" min="0" max="1.5" step="0.01" value="0.3">
      </label>
      <label class="check">
        <input type="checkbox" id="invert">
        <span>Invert depth</span>
      </label>
      <label class="check">
        <input type="checkbox" id="depthShade" checked>
        <span>Depth shade</span>
      </label>
    </div>

    <script type="module" src="/src/pointcloud.js"></script>
  </body>
</html>
