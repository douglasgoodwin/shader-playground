<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Palette</title>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <nav id="nav">
      <a href="/playground/" class="back">Playground</a>
      <span class="title">Palette</span>
    </nav>
    <button id="record-btn" aria-label="Record H.264 video (R)" data-tip="Record H.264 video — press R"></button>
    <button id="frame-btn" aria-label="Record PNG frame sequence for ProRes (P)" data-tip="Record PNG frame sequence for ProRes — press P"></button>
    <div id="frame-counter" class="hidden"></div>
    <div id="controls">
      <button data-effect="riso" class="active"><span class="key">1</span> Riso</button>
      <button data-effect="pastel"><span class="key">2</span> Pastel</button>
      <button data-effect="thermal"><span class="key">3</span> Thermal</button>
      <button data-effect="duotone"><span class="key">4</span> Duotone</button>
      <button data-effect="posterize"><span class="key">5</span> Posterize</button>
    </div>
    <div id="image-controls">
      <div id="drop-zone">
        <p>Drop image/video here<br><span class="small">or click to browse</span></p>
        <input type="file" id="file-input" accept="image/*,video/*" />
      </div>
      <div class="url-row">
        <input type="text" id="url-input" placeholder="Or paste image/video URL..." />
        <button id="load-url">Load</button>
      </div>
      <div id="loading" class="hidden">Loading...</div>
    </div>
    <div id="duotone-colors" style="display:none">
      <label>
        <span>Shadow</span>
        <input type="color" id="color-a" value="#1a0533">
      </label>
      <label>
        <span>Highlight</span>
        <input type="color" id="color-b" value="#ff6600">
      </label>
    </div>
    <div id="sliders">
      <label>
        <span>Intensity</span>
        <input type="range" id="intensity" min="0" max="1" step="0.05" value="0.7">
      </label>
      <label>
        <span>Scale</span>
        <input type="range" id="scale" min="0.1" max="30" step="0.1" value="1">
      </label>
    </div>
    <script type="module" src="/src/palette.js"></script>
  </body>
</html>
