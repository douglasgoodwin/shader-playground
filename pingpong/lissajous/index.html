<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lissajous Smear</title>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <nav id="nav">
      <a href="/pingpong/" class="back">PingPong</a>
      <span class="title">Lissajous Smear</span>
    </nav>
    <button id="record-btn" title="Record video (R)"></button>
    <div id="sliders">
      <label>
        <span>Decay</span>
        <input type="range" id="decay" min="0.80" max="0.995" step="0.001" value="0.96">
      </label>
      <label>
        <span>Speed</span>
        <input type="range" id="speed" min="0.1" max="3.0" step="0.05" value="0.8">
      </label>
      <label>
        <span>Radius</span>
        <input type="range" id="radius" min="0.005" max="0.08" step="0.001" value="0.025">
      </label>
      <label>
        <span>Hue</span>
        <input type="range" id="hue" min="0.0" max="1.0" step="0.01" value="0.58">
      </label>
    </div>
    <script type="module" src="/src/pingpong/lissajous.js"></script>
  </body>
</html>
