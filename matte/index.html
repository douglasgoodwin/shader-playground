<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Matte — Shader Playground</title>
    <meta name="description" content="Janie Geiser-style matte compositing — three layers (back, front, matte) with the hole's edges animated by the shader." />
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <nav id="nav">
      <a href="/playground/" class="back">Playground</a>
      <span class="title">Matte</span>
    </nav>
    <button id="record-btn" title="Record video (R)"></button>

    <div id="matte-controls">
      <div class="drop-row">
        <span class="drop-label">Background</span>
        <div class="drop-zone" id="back-zone">
          Drop image / video
          <span class="drop-hint">or click</span>
          <input type="file" id="back-input" accept="image/*,video/*" style="display:none;" />
        </div>
      </div>

      <div class="drop-row">
        <span class="drop-label">Foreground</span>
        <div class="drop-zone" id="front-zone">
          Drop image / video
          <span class="drop-hint">or click</span>
          <input type="file" id="front-input" accept="image/*,video/*" style="display:none;" />
        </div>
      </div>

      <div class="drop-row">
        <span class="drop-label">Matte</span>
        <div class="drop-zone" id="matte-zone">
          Drop matte PNG
          <span class="drop-hint">alpha or luminance</span>
          <input type="file" id="matte-input" accept="image/*" style="display:none;" />
        </div>
      </div>

      <label id="matte-source-toggle">
        <input type="checkbox" id="use-luminance" />
        Use matte luminance
      </label>
    </div>

    <div id="sliders" class="sliders-panel">
      <label>
        <span>Drift</span>
        <input type="range" id="drift" min="0" max="0.4" step="0.005" value="0.06" />
      </label>
      <label>
        <span>Breath</span>
        <input type="range" id="breath" min="0" max="0.3" step="0.005" value="0.06" />
      </label>
      <label>
        <span>Edge Jitter</span>
        <input type="range" id="jitter" min="0" max="0.3" step="0.005" value="0.04" />
      </label>
      <label>
        <span>Softness</span>
        <input type="range" id="softness" min="0.005" max="0.4" step="0.005" value="0.08" />
      </label>
      <label>
        <span>Speed</span>
        <input type="range" id="speed" min="0" max="3" step="0.05" value="1.0" />
      </label>
    </div>

    <script type="module" src="/src/matte.js"></script>
  </body>
</html>
