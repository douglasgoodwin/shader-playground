<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spike</title>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <nav id="nav">
      <a href="/playground/" class="back">Playground</a>
      <span class="title">Spike</span>
    </nav>
    <button id="record-btn" title="Record video (R)"></button>
    <div id="controls">
      <button data-effect="breathe" class="active"><span class="key">1</span> Breathe</button>
      <button data-effect="melt"><span class="key">2</span> Melt</button>
      <button data-effect="glitch"><span class="key">3</span> Glitch</button>
      <button data-effect="ripple"><span class="key">4</span> Ripple</button>
      <button data-effect="erode"><span class="key">5</span> Erode</button>
      <button data-effect="face"><span class="key">6</span> Face</button>
      <button data-effect="amoeba"><span class="key">7</span> Amoeba</button>
    </div>
    <div id="model-controls">
      <div id="model-drop-zone">
        <p>Drop OBJ here<br><span class="small">or click to browse</span></p>
        <input type="file" id="model-file-input" accept=".obj" />
      </div>
      <div class="url-row">
        <input type="text" id="model-url-input" placeholder="Or paste OBJ URL..." />
        <button id="model-load-url">Load</button>
      </div>
      <div id="model-loading" class="hidden">Loading...</div>
    </div>
    <div id="sliders">
      <label>
        <span>Intensity</span>
        <input type="range" id="intensity" min="0" max="3" step="0.05" value="1">
      </label>
    </div>
    <div id="audio-panel" style="display:none">
      <div id="audio-label">Mic Input</div>
      <div id="level-track"><div id="level-meter"></div></div>
      <div id="audio-status"></div>
    </div>
    <div id="webcam-panel" style="display:none">
      <video id="webcam-preview" playsinline autoplay muted></video>
      <div id="face-status"></div>
    </div>
    <script type="module" src="/src/spike.js"></script>
  </body>
</html>
